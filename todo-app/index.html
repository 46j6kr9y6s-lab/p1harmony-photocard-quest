<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✅ My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <main>
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">➕ Add</button>
                </div>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <span id="totalTasks">Total: 0</span>
                <span id="completedTasks">Completed: 0</span>
            </div>

            <!-- To-Do List -->
            <div class="todos-container">
                <ul id="todoList" class="todo-list">
                    <li class="empty-state">📝 No tasks yet. Add one to get started!</li>
                </ul>
            </div>

            <!-- Clear Completed Button -->
            <div class="action-buttons">
                <button id="clearCompletedBtn" class="clear-btn">🗑️ Clear Completed</button>
                <button id="clearAllBtn" class="clear-all-btn">Clear All</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
